# High-Availability production setup (§12.2)
# 2 axiom-server replicas + PostgreSQL primary/replica + nginx load balancer

version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       axiom
      POSTGRES_USER:     axiom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Axiom server — replica 1 ──────────────────────────────────────────────
  axiom-1:
    image: ghcr.io/axiom-rules/axiom:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dead-letter:/data/dead-letter
      - ./axiom.yaml:/axiom.yaml:ro
    environment:
      AXIOM_STORAGE_BACKEND:    postgres
      AXIOM_STORAGE_POSTGRES_URL: postgres://axiom:${POSTGRES_PASSWORD}@postgres:5432/axiom
      AXIOM_DEAD_LETTER_PATH:   /data/dead-letter
      AXIOM_LOG_LEVEL:          info
      AXIOM_RULE_POLL_SECS:     10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Axiom server — replica 2 ──────────────────────────────────────────────
  axiom-2:
    image: ghcr.io/axiom-rules/axiom:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dead-letter:/data/dead-letter
      - ./axiom.yaml:/axiom.yaml:ro
    environment:
      AXIOM_STORAGE_BACKEND:    postgres
      AXIOM_STORAGE_POSTGRES_URL: postgres://axiom:${POSTGRES_PASSWORD}@postgres:5432/axiom
      AXIOM_DEAD_LETTER_PATH:   /data/dead-letter
      AXIOM_LOG_LEVEL:          info
      AXIOM_RULE_POLL_SECS:     10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx load balancer ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - axiom-1
      - axiom-2

volumes:
  pg-data:
