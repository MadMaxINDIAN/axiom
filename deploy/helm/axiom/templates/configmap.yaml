apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "axiom.fullname" . }}
  labels:
    {{- include "axiom.labels" . | nindent 4 }}
data:
  axiom.yaml: |
    host: "0.0.0.0"
    port: 8080
    storage:
      backend: {{ .Values.storage.backend | quote }}
      {{- if eq .Values.storage.backend "sqlite" }}
      path: {{ .Values.storage.sqlitePath | quote }}
      {{- end }}
    log_level: {{ .Values.config.logLevel | quote }}
    rule_poll_secs: {{ .Values.config.rulePollSecs }}
    rate_limit_per_sec: {{ .Values.config.rateLimitPerSec }}
    dead_letter_path: {{ .Values.config.deadLetterPath | quote }}
    {{- if .Values.config.rulesDir }}
    rules_dir: {{ .Values.config.rulesDir | quote }}
    {{- end }}
    {{- if .Values.webhooks }}
    webhooks:
      {{- toYaml .Values.webhooks | nindent 6 }}
    {{- end }}
